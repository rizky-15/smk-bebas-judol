<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerbang Masuk - ANTI RUNGKAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            background-color: #000;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(220, 38, 38, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(220, 38, 38, 0.1) 0%, transparent 50%);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: -webkit-fill-available;
        }

        .glass-container {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-dark {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-dark:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.1);
            background: rgba(30, 30, 30, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.4);
        }

        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIzxy9dKBWechcr_f4rfjrakzb5NBe_gA",
            authDomain: "login-website-judol.firebaseapp.com",
            projectId: "login-website-judol",
            storageBucket: "login-website-judol.firebasestorage.app",
            messagingSenderId: "1094661331467",
            appId: "1:1094661331467:web:d82b020ada91fd9f20050e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const apiKey = ""; 
        const SECRET_ADMIN_CODE = "ADMIN123"; // Kode akses admin

        // Fungsi Toast Notification
        window.showToast = (msg, type = 'error') => {
            const toast = document.getElementById('toast');
            toast.className = `fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-sm font-bold shadow-2xl z-[100] transition-all duration-500 flex items-center gap-3 ${type === 'error' ? 'bg-red-600' : 'bg-green-600'}`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            toast.style.opacity = "1";
            toast.style.transform = "translate(-50%, 0)";
            lucide.createIcons();
            setTimeout(() => { 
                toast.style.opacity = "0"; 
                toast.style.transform = "translate(-50%, -20px)";
            }, 3000);
        };

        // Handle Login
        window.handleLogin = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const btn = e.submitter;
            
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white/20 border-t-white rounded-full mr-2"></span> Memproses...`;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                const userSnap = await getDoc(doc(db, "users", user.uid));
                
                if (userSnap.exists()) {
                    const role = userSnap.data().role;
                    window.location.href = role === "admin" ? "admin_dashboard.html" : "member_dashboard.html";
                }
            } catch (err) {
                showToast("Email atau password tidak terdaftar.");
                btn.disabled = false;
                btn.innerText = "MASUK SEKARANG";
            }
        };

        // Handle Register
        window.handleRegister = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const role = document.getElementById('reg-role').value;
            const adminCode = document.getElementById('reg-admin-code').value;

            if (role === 'admin' && adminCode !== SECRET_ADMIN_CODE) {
                showToast("Kode Verifikasi Admin Salah!");
                return;
            }

            const btn = e.submitter;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin inline-block w-4 h-4 border-2 border-white/20 border-t-white rounded-full mr-2"></span> Membuat Akun...`;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    displayName: name,
                    email: email,
                    role: role,
                    exp: 0,
                    level: 1,
                    createdAt: new Date().toISOString()
                });

                showToast("Berhasil terdaftar sebagai " + role.toUpperCase(), "success");
                setTimeout(() => location.reload(), 1500);
            } catch (err) {
                showToast(err.message);
                btn.disabled = false;
                btn.innerText = "BUAT AKUN";
            }
        };

        // AI Chat Logic
        window.askAI = async () => {
            const input = document.getElementById('chat-input');
            const box = document.getElementById('chat-box');
            const msg = input.value.trim();
            if(!msg) return;

            input.value = "";
            box.innerHTML += `<div class="flex justify-end mb-3"><div class="bg-red-600 text-white p-3 rounded-2xl rounded-tr-none text-xs max-w-[80%]">${msg}</div></div>`;
            box.scrollTop = box.scrollHeight;

            const aiId = "ai-" + Date.now();
            box.innerHTML += `<div class="flex justify-start mb-3"><div id="${aiId}" class="bg-zinc-800 text-zinc-300 p-3 rounded-2xl rounded-tl-none text-xs max-w-[80%] italic animate-pulse">Berpikir...</div></div>`;

            const systemPrompt = "Kamu adalah Bang Anti, konselor sebaya yang asik tapi tegas soal bahaya judi online. Gunakan istilah gaul tapi sopan seperti 'Sobat Rungkad', 'Pola Setingan', atau 'Mental Tempe'. Fokus pada edukasi bahwa bandar selalu menang. Jawab dengan singkat dan padat.";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: msg }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, kepalaku lagi pusing. Coba tanya lagi ya.";
                document.getElementById(aiId).innerText = reply;
                document.getElementById(aiId).classList.remove('italic', 'animate-pulse');
            } catch {
                document.getElementById(aiId).innerText = "Koneksi lagi rungkad nih, coba lagi nanti.";
            }
            box.scrollTop = box.scrollHeight;
        };

        window.switchAuth = (mode) => {
            document.getElementById('login-section').classList.toggle('hidden', mode === 'reg');
            document.getElementById('reg-section').classList.toggle('hidden', mode === 'login');
        };

        window.setRole = (role) => {
            document.getElementById('reg-role').value = role;
            const isMember = role === 'member';
            
            document.getElementById('role-member').className = isMember ? 'flex-1 py-3 rounded-xl font-bold text-xs bg-red-600 text-white' : 'flex-1 py-3 rounded-xl font-bold text-xs bg-zinc-900 text-zinc-500';
            document.getElementById('role-admin').className = !isMember ? 'flex-1 py-3 rounded-xl font-bold text-xs bg-red-600 text-white' : 'flex-1 py-3 rounded-xl font-bold text-xs bg-zinc-900 text-zinc-500';
            
            document.getElementById('admin-box').classList.toggle('hidden', isMember);
        };

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            onAuthStateChanged(auth, async (u) => {
                if(u) {
                    const s = await getDoc(doc(db, "users", u.uid));
                    if(s.exists()) location.href = s.data().role === "admin" ? "admin_dashboard.html" : "member_dashboard.html";
                }
            });
        });
    </script>
</head>
<body class="flex flex-col items-center justify-center p-6 lg:p-12">

    <div id="toast" style="opacity:0; pointer-events:none;"></div>

    <div class="w-full max-w-lg">
        <!-- Brand -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-600 rounded-2xl mb-4 rotate-3 shadow-xl shadow-red-900/40">
                <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-4xl font-black italic tracking-tighter">ANTI<span class="text-red-600">RUNGKAD</span></h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] font-bold mt-1">Sistem Literasi & Edukasi Cerdas</p>
        </div>

        <!-- Login Section -->
        <div id="login-section" class="glass-container p-8 lg:p-10 rounded-[2.5rem] fade-in">
            <h2 class="text-2xl font-extrabold mb-8 flex items-center gap-3">
                <span class="w-1.5 h-6 bg-red-600 rounded-full"></span> Akses Masuk
            </h2>
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-1">Email Pengguna</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600"></i>
                        <input type="email" id="login-email" required placeholder="name@example.id" class="input-dark w-full pl-12 pr-4 py-4 rounded-2xl text-sm outline-none">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-zinc-400 uppercase tracking-widest ml-1">Kata Sandi</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600"></i>
                        <input type="password" id="login-pass" required placeholder="••••••••" class="input-dark w-full pl-12 pr-4 py-4 rounded-2xl text-sm outline-none">
                    </div>
                </div>
                <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-black text-sm tracking-widest shadow-xl">MASUK SEKARANG</button>
            </form>
            <div class="mt-10 pt-8 border-t border-zinc-900 text-center">
                <p class="text-zinc-500 text-xs font-medium">Belum terdaftar di sistem? <button onclick="switchAuth('reg')" class="text-red-500 font-bold hover:underline">Buat Akun Baru</button></p>
            </div>
        </div>

        <!-- Register Section -->
        <div id="reg-section" class="glass-container p-8 lg:p-10 rounded-[2.5rem] hidden fade-in">
            <h2 class="text-2xl font-extrabold mb-1">Daftar Akun</h2>
            <p class="text-[11px] text-zinc-500 mb-8 uppercase tracking-widest font-bold">Pilih Peran & Identitas Anda</p>
            
            <form onsubmit="handleRegister(event)" class="space-y-5">
                <div class="flex p-1.5 bg-zinc-950 rounded-2xl gap-1.5 mb-2 border border-zinc-900">
                    <input type="hidden" id="reg-role" value="member">
                    <button type="button" id="role-member" onclick="setRole('member')" class="flex-1 py-3 rounded-xl font-bold text-xs bg-red-600 text-white transition-all">SISWA</button>
                    <button type="button" id="role-admin" onclick="setRole('admin')" class="flex-1 py-3 rounded-xl font-bold text-xs bg-zinc-900 text-zinc-500 transition-all">ADMIN/GURU</button>
                </div>

                <div id="admin-box" class="hidden bg-red-950/20 border border-red-900/30 p-5 rounded-2xl fade-in mb-4">
                    <label class="text-[9px] font-black text-red-500 uppercase tracking-widest mb-2 block">Kode Verifikasi Guru</label>
                    <input type="password" id="reg-admin-code" placeholder="Kode Rahasia Admin" class="w-full bg-black/40 border border-red-900/50 rounded-xl px-4 py-3 text-xs outline-none focus:border-red-600 text-white">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Nama Lengkap</label>
                        <input type="text" id="reg-name" required class="input-dark w-full px-4 py-3.5 rounded-xl text-xs outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Email Aktif</label>
                        <input type="email" id="reg-email" required class="input-dark w-full px-4 py-3.5 rounded-xl text-xs outline-none">
                    </div>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-zinc-500 uppercase ml-1">Password Baru</label>
                    <input type="password" id="reg-pass" required placeholder="Min. 6 Karakter" class="input-dark w-full px-4 py-3.5 rounded-xl text-xs outline-none">
                </div>

                <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-black text-sm tracking-widest shadow-xl mt-4">KONFIRMASI PENDAFTARAN</button>
            </form>
            <div class="mt-8 text-center">
                <button onclick="switchAuth('login')" class="text-zinc-500 text-xs font-bold hover:text-white transition">← Kembali ke Login</button>
            </div>
        </div>
    </div>

    <!-- AI Floating UI -->
    <div class="fixed bottom-6 right-6">
        <button onclick="document.getElementById('bot-ui').classList.toggle('hidden')" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all">
            <i data-lucide="bot" class="w-6 h-6"></i>
        </button>
        <div id="bot-ui" class="hidden absolute bottom-20 right-0 w-80 h-[450px] glass-container rounded-[2rem] overflow-hidden flex flex-col shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] border border-white/10">
            <div class="p-5 bg-gradient-to-r from-red-600 to-red-800 flex items-center justify-between">
                <div>
                    <p class="text-[9px] font-bold text-white/60 uppercase">Asisten Literasi</p>
                    <h3 class="font-black text-sm italic">BANG ANTI</h3>
                </div>
                <div class="flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                    <span class="text-[9px] font-bold">Online</span>
                </div>
            </div>
            <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-3 bg-zinc-950/40">
                <div class="flex justify-start">
                    <div class="bg-zinc-800 text-zinc-300 p-3 rounded-2xl rounded-tl-none text-xs max-w-[80%]">
                        Woy! Ada masalah apa? Mau curhat soal rungkad atau sekadar tanya-tanya? Gue Bang Anti siap bantu.
                    </div>
                </div>
            </div>
            <div class="p-3 bg-zinc-900 border-t border-white/5 flex gap-2">
                <input type="text" id="chat-input" placeholder="Tanya sesuatu..." class="flex-grow bg-black border border-white/5 rounded-xl px-4 py-2.5 text-[11px] outline-none focus:border-red-600" onkeypress="if(event.key === 'Enter') askAI()">
                <button onclick="askAI()" class="bg-red-600 p-2.5 rounded-xl"><i data-lucide="send" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

</body>
</html>
