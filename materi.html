<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUSAT LITERASI - ANTI RUNGKAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        // Pastikan Anda menambahkan 'arrayUnion' di baris import ini:
        import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIzxy9dKBWechcr_f4rfjrakzb5NBe_gA",
            authDomain: "login-website-judol.firebaseapp.com",
            projectId: "login-website-judol",
            storageBucket: "login-website-judol.firebasestorage.app",
            messagingSenderId: "1094661331467",
            appId: "1:1094661331467:web:d82b020ada91fd9f20050e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.materiCache = {};
        let allMateri = [];
        let currentFilter = 'SEMUA';
        let currentUserUid = null;
        let userDataCache = null;

        const urlParams = new URLSearchParams(window.location.search);
        const filterParam = urlParams.get('filter');
        if (filterParam) currentFilter = filterParam.toUpperCase();

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                currentUserUid = user.uid;
                // Fetch data user untuk mengecek materi mana yang sudah pernah dibaca
                const userDoc = await getDoc(doc(db, "users", currentUserUid));
                if(userDoc.exists()) userDataCache = userDoc.data();
                
                fetchDataMateri();
            }
        });

        // --- SISTEM PEMBERIAN EXP (ONCE CLEAR) ---
        window.rewardExp = async function(points, reason, materiId) {
            if(!currentUserUid) return;
            try {
                const userRef = doc(db, "users", currentUserUid);
                const snap = await getDoc(userRef);
                if(snap.exists()) {
                    const data = snap.data();
                    let exp = data.exp || 0;
                    exp += points;

                    let level = 1;
                    if (exp >= 1000) level = 5;
                    else if (exp >= 500) level = 4;
                    else if (exp >= 250) level = 3;
                    else if (exp >= 100) level = 2;

                    const updateData = { 
                        exp: exp, 
                        level: level,
                        // KODE BARU: Merekam log ke dalam riwayat database
                        activityLogs: arrayUnion({
                            activity: reason,
                            expGained: points,
                            timestamp: new Date().toISOString()
                        })
                    };
                    
                    // Catat bahwa materi ini sudah diselesaikan agar tidak bisa di-spam
                    if (materiId) {
                         let readList = data.readMateri || [];
                         if(!readList.includes(materiId)) {
                             readList.push(materiId);
                             updateData.readMateri = readList;
                             if(userDataCache) userDataCache.readMateri = readList;
                         }
                    }

                    await updateDoc(userRef, updateData);
                    showExpAnimation(points, reason);
                }
            } catch(e) { console.error("EXP Error", e); }
        }

        function showExpAnimation(points, reason) {
            const toast = document.getElementById('exp-toast');
            document.getElementById('exp-points').innerText = `+${points} EXP`;
            document.getElementById('exp-reason').innerText = reason;

            toast.classList.remove('hidden', 'exp-float');
            void toast.offsetWidth; // Trigger reflow animasi
            toast.classList.add('exp-float');

            setTimeout(() => { toast.classList.add('hidden'); }, 2000);
        }

        async function fetchDataMateri() {
            const container = document.getElementById('materi-container');
            container.innerHTML = `<div class="text-center py-10 text-yellow-500 animate-pulse"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto mb-2"></i> Sinkronisasi database...</div>`;
            if (window.lucide) lucide.createIcons();

            try {
                const q = query(collection(db, "materi"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                allMateri = [];
                querySnapshot.forEach((doc) => {
                    const m = doc.data();
                    m.id = doc.id;
                    window.materiCache[doc.id] = m;
                    allMateri.push(m);
                });

                renderListMateri(currentFilter);
            } catch (error) {
                container.innerHTML = `<div class="text-center py-10 text-red-500">Gagal memuat materi.</div>`;
            }
        }

        window.renderListMateri = function(kategori) {
            currentFilter = kategori;
            updateFilterButtonsUI();
            
            const container = document.getElementById('materi-container');
            let html = "";
            let count = 0;

            allMateri.forEach((m) => {
                const isMatch = (kategori === 'SEMUA') || (m.kategori && m.kategori.toUpperCase().includes(kategori));
                
                if (isMatch) {
                    count++;
                    let previewTeks = m.isi ? m.isi.substring(0, 150) + "..." : "Tidak ada deskripsi.";
                    
                    let iconCat = 'book-open';
                    let colorCat = 'text-yellow-500 bg-yellow-900/30 border-yellow-700/50';
                    
                    if(m.kategori?.toUpperCase().includes('TESTIMONI')) { iconCat = 'video'; colorCat = 'text-red-500 bg-red-900/30 border-red-700/50'; }
                    else if(m.kategori?.toUpperCase().includes('PSIKOLOGI')) { iconCat = 'brain'; colorCat = 'text-blue-500 bg-blue-900/30 border-blue-700/50'; }
                    else if(m.kategori?.toUpperCase().includes('HUKUM')) { iconCat = 'scale'; colorCat = 'text-green-500 bg-green-900/30 border-green-700/50'; }

                    html += `
                        <article onclick="bukaMateri('${m.id}')" class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 md:p-8 hover:border-yellow-500 hover:bg-zinc-800/80 transition-all cursor-pointer group shadow-lg">
                            <div class="flex items-center gap-3 mb-4 justify-between">
                                <span class="${colorCat} text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border flex items-center gap-1">
                                    <i data-lucide="${iconCat}" class="w-3 h-3"></i> ${m.kategori || 'UMUM'}
                                </span>
                            </div>
                            <h2 class="text-2xl font-black text-white mb-3 italic group-hover:text-yellow-400 transition-colors">${m.judul}</h2>
                            <p class="text-gray-400 text-sm leading-relaxed mb-4">${previewTeks}</p>
                            <div class="text-zinc-500 text-xs font-bold uppercase tracking-widest flex items-center gap-1 group-hover:text-yellow-400 transition">
                                Pelajari Detail <i data-lucide="chevron-right" class="w-4 h-4"></i>
                            </div>
                        </article>
                    `;
                }
            });

            if (count === 0) {
                html = `<div class="text-center py-16 bg-zinc-900 border border-zinc-800 rounded-2xl"><i data-lucide="folder-search" class="w-12 h-12 text-zinc-600 mx-auto mb-4"></i><h3 class="text-white font-bold mb-2">Materi Kosong</h3><p class="text-sm text-zinc-500">Belum ada data untuk kategori <b>${kategori}</b>.</p></div>`;
            }
            container.innerHTML = html;
            if (window.lucide) lucide.createIcons();
        };

        function updateFilterButtonsUI() {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach(btn => {
                if(btn.dataset.filter === currentFilter) {
                    btn.classList.add('bg-white', 'text-black');
                    btn.classList.remove('bg-zinc-900', 'text-zinc-400', 'hover:bg-zinc-800');
                } else {
                    btn.classList.remove('bg-white', 'text-black');
                    btn.classList.add('bg-zinc-900', 'text-zinc-400', 'hover:bg-zinc-800');
                }
            });
        }

        window.bukaMateri = function(id) {
            const data = window.materiCache[id];
            if (!data) return;

            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            window.scrollTo(0,0);

            document.getElementById('detail-kategori').innerText = data.kategori || 'UMUM';
            document.getElementById('detail-judul').innerText = data.judul;
            document.getElementById('detail-isi').innerHTML = data.isi ? data.isi.replace(/\n/g, '<br/><br/>') : '';

            // Cek status baca dan berikan EXP jika belum pernah dibaca (Once Clear)
            if (userDataCache) {
                const readList = userDataCache.readMateri || [];
                if (!readList.includes(id)) {
                    setTimeout(() => {
                        window.rewardExp(15, "Membaca Materi Edukasi Baru", id);
                    }, 1500); // Delay 1.5 detik agar user fokus ke teks dulu
                }
            }

            // Menampilkan MULTIPLE LINKS
            const previewSection = document.getElementById('file-preview-section');
            const previewContent = document.getElementById('preview-content');
            
            // Gabungkan array fileUrls baru atau fileUrl lama ke dalam satu array
            let urlsToRender = [];
            if(data.fileUrls && Array.isArray(data.fileUrls)) {
                urlsToRender = data.fileUrls;
            } else if (data.fileUrl && data.fileUrl.trim() !== '') {
                urlsToRender = [data.fileUrl]; // Support data lama
            }

            if (urlsToRender.length > 0) {
                previewSection.classList.remove('hidden');
                let allPreviewsHTML = '';
                
                urlsToRender.forEach((urlLampiran, idx) => {
                    let previewHTML = '';
                    const ytRegex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
                    const ytMatch = urlLampiran.match(ytRegex);

                    if (ytMatch && ytMatch[1]) {
                        previewHTML = `<div class="border border-zinc-700 rounded-xl overflow-hidden bg-zinc-900 mb-4 aspect-video shadow-lg"><iframe src="https://www.youtube.com/embed/${ytMatch[1]}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>`;
                    } else if (urlLampiran.toLowerCase().match(/\.(jpeg|jpg|gif|png|webp)/i) || urlLampiran.includes('alt=media')) {
                        previewHTML = `<div class="border border-zinc-700 rounded-xl overflow-hidden bg-zinc-950/50 mb-4 flex justify-center p-4"><img src="${urlLampiran}" alt="Lampiran" class="max-w-full h-auto max-h-[600px] rounded object-contain"></div>`;
                    } else {
                        previewHTML = `<div class="border border-zinc-700 rounded-xl overflow-hidden bg-zinc-900 mb-4 h-[300px] md:h-[500px]"><iframe src="${urlLampiran}" class="w-full h-full" frameborder="0" allowfullscreen></iframe></div>`;
                    }
                    
                    // Bungkus tiap preview di dalam div spasi
                    allPreviewsHTML += `
                        <div class="mb-8 last:mb-0">
                            ${previewHTML}
                            <a href="${urlLampiran}" target="_blank" class="inline-flex items-center gap-2 bg-zinc-800 hover:bg-yellow-600 hover:text-black border border-zinc-700 text-white font-bold py-3 px-6 rounded-xl transition shadow-md w-full justify-center text-sm">
                                <i data-lucide="external-link" class="w-4 h-4"></i> Buka Tautan Media ${idx + 1}
                            </a>
                        </div>
                    `;
                });

                previewContent.innerHTML = allPreviewsHTML;
            } else {
                previewSection.classList.add('hidden');
                previewContent.innerHTML = '';
            }
            if (window.lucide) lucide.createIcons();
        };

        window.tutupMateri = function() {
            document.getElementById('view-detail').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            window.scrollTo(0,0);
        };
    </script>

    <style>
        body { background-color: #000; background-image: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.95)), url("https://www.transparenttextures.com/patterns/dark-matter.png"); color: #e5e5e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animasi EXP Melayang */
        @keyframes floatUp {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, -100px); opacity: 0; }
        }
        .exp-float { animation: floatUp 2.5s ease-out forwards; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- Floating EXP Toast (Sembunyi by default) -->
    <div id="exp-toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none z-[200] hidden flex-col items-center">
        <span id="exp-points" class="text-5xl font-black text-yellow-500 drop-shadow-[0_0_20px_rgba(234,179,8,1)] tracking-tighter italic">+15 EXP</span>
        <span id="exp-reason" class="bg-yellow-900/80 text-yellow-200 font-bold text-[10px] uppercase px-4 py-1.5 rounded-full mt-2 border border-yellow-500/50 shadow-lg">Membaca Materi</span>
    </div>

    <!-- Navbar -->
    <nav class="bg-neutral-900 border-b border-yellow-600/30 px-6 py-4 sticky top-0 z-50 shadow-lg backdrop-blur-md bg-neutral-900/90">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 text-yellow-500 font-black text-xl italic tracking-tighter uppercase">
                <i data-lucide="library" class="text-yellow-500"></i> PUSAT LITERASI
            </div>
            <a href="member_dashboard.html" class="bg-zinc-800 hover:bg-zinc-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition border border-zinc-700 shadow-md">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="hidden md:inline">DASHBOARD</span>
            </a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-6 w-full flex-grow relative">
        <div id="view-list" class="animate-[fadeIn_0.5s_ease-out]">
            <div class="mb-6 text-center">
                <h1 class="text-3xl md:text-4xl font-black text-white italic mb-2 uppercase tracking-tighter">Database <span class="text-yellow-500">Penelitian</span></h1>
                <p class="text-zinc-400 text-sm max-w-2xl mx-auto">Telusuri fakta algoritma, kesaksian korban, dampak psikologis, dan regulasi hukum seputar judi online.</p>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar mb-8 pb-2 border-b border-zinc-800">
                <button data-filter="SEMUA" onclick="renderListMateri('SEMUA')" class="filter-btn bg-white text-black px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-zinc-700">Semua Info</button>
                <button data-filter="ALGORITMA" onclick="renderListMateri('ALGORITMA')" class="filter-btn bg-zinc-900 text-zinc-400 hover:bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-zinc-700">Fakta Algoritma</button>
                <button data-filter="TESTIMONI" onclick="renderListMateri('TESTIMONI')" class="filter-btn bg-zinc-900 text-zinc-400 hover:bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-zinc-700">Video Testimoni</button>
                <button data-filter="PSIKOLOGI" onclick="renderListMateri('PSIKOLOGI')" class="filter-btn bg-zinc-900 text-zinc-400 hover:bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-zinc-700">Risiko Psikologi</button>
                <button data-filter="HUKUM" onclick="renderListMateri('HUKUM')" class="filter-btn bg-zinc-900 text-zinc-400 hover:bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold whitespace-nowrap transition border border-zinc-700">Hukum UU ITE</button>
            </div>
            <div id="materi-container" class="space-y-4"></div>
        </div>

        <div id="view-detail" class="hidden animate-[fadeIn_0.4s_ease-out]">
            <button onclick="tutupMateri()" class="mb-6 flex items-center gap-2 text-zinc-400 hover:text-white transition font-bold text-sm tracking-wider uppercase bg-zinc-900 py-2 px-4 rounded-lg border border-zinc-800 hover:border-zinc-500 w-fit">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
            </button>
            <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 md:p-10 shadow-2xl relative overflow-hidden">
                <div class="mb-8 border-b border-zinc-800 pb-8">
                    <span id="detail-kategori" class="inline-block bg-zinc-800 text-white text-xs font-black uppercase tracking-widest px-4 py-1.5 rounded-full border border-zinc-700 mb-4">KATEGORI</span>
                    <h1 id="detail-judul" class="text-3xl md:text-5xl font-black text-white italic leading-tight">Judul Materi</h1>
                </div>
                
                <!-- Teks Detail Isi Dipindah Ke Atas -->
                <div id="detail-isi" class="text-gray-300 text-base md:text-lg leading-relaxed text-justify space-y-4 mb-8"></div>

                <!-- Tempat Preview Multiple Links Dipindah Ke Bawah -->
                <div id="file-preview-section" class="hidden mb-8 pt-8 border-t border-zinc-800">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="monitor-play" class="text-yellow-500 w-5 h-5"></i> Media Pendukung</h3>
                    <div id="preview-content"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 text-center text-zinc-700 text-[10px] border-t border-zinc-900 uppercase tracking-[0.3em] font-bold">
        &copy; 2024 ANTIRUNGKAD.ORG • SATUAN TUGAS EDUKASI DIGITAL SMK
    </footer>
</body>
</html>
