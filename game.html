<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Sistem Manipulatif - ANTI RUNGKAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&display=swap');
        
        body { 
            background-color: #09090b; 
            color: #e5e5e5; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-goldman { font-family: 'Goldman', cursive; }

        /* Reel Styling */
        .reel-window { 
            height: 150px; 
            overflow: hidden; 
            position: relative; 
            background: #111;
            border: 2px solid #333;
            border-radius: 12px;
        }
        
        .reel-strip { 
            display: flex; 
            flex-direction: column; 
            transition: transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .symbol { 
            height: 150px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Overlay Depo */
        #depo-modal {
            backdrop-filter: blur(8px);
            display: none;
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.8);
        }

        .jackpot-anim {
            animation: jackpot 0.5s infinite alternate;
        }

        @keyframes jackpot {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.1); filter: brightness(1.5); }
        }

        /* Log styling */
        .log-entry {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <!-- Header & Saldo -->
    <header class="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-zinc-900/50 p-4 rounded-3xl border border-white/5">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 hover:bg-white/10 rounded-full transition">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <div>
                <h1 class="text-xl font-black text-red-500 italic">SIMULATOR RUNGKAD v2.0</h1>
                <p class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest">Waspada Algoritma Settingan</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="bg-black px-6 py-2 rounded-2xl border border-red-900/50 flex flex-col items-center">
                <span class="text-[9px] text-zinc-500 font-bold uppercase">Saldo Anda</span>
                <span id="saldo-display" class="text-xl font-goldman text-yellow-500">Rp 0</span>
            </div>
            <button onclick="openDepo()" class="bg-green-600 hover:bg-green-500 text-white font-black px-6 py-3 rounded-2xl transition shadow-[0_0_15px_rgba(22,163,74,0.4)] flex items-center gap-2">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> DEPOSIT
            </button>
        </div>
    </header>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Kiri: Game Slot -->
        <div class="lg:col-span-7 bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-4 md:p-8 flex flex-col gap-6 relative overflow-hidden">
            <!-- Dekorasi Lampu -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 via-yellow-500 to-red-600 animate-pulse"></div>

            <!-- Area Reel -->
            <div class="grid grid-cols-3 gap-3 md:gap-6 bg-black p-4 rounded-3xl border-4 border-zinc-800 shadow-inner">
                <div class="reel-window"><div id="reel-1" class="reel-strip"></div></div>
                <div class="reel-window"><div id="reel-2" class="reel-strip"></div></div>
                <div class="reel-window"><div id="reel-3" class="reel-strip"></div></div>
            </div>

            <!-- Kontrol -->
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-white/5">
                    <span class="text-xs font-bold text-zinc-400">TARUHAN (BET)</span>
                    <select id="bet-select" class="bg-zinc-800 border-none rounded-lg text-sm font-bold text-white px-4 py-1 outline-none">
                        <option value="5000">Rp 5.000</option>
                        <option value="25000">Rp 25.000</option>
                        <option value="100000">Rp 100.000</option>
                    </select>
                </div>

                <button id="spin-btn" onclick="mulaiSpin()" class="w-full bg-gradient-to-b from-red-500 to-red-700 hover:from-red-400 hover:to-red-600 text-white font-black py-5 rounded-2xl text-2xl shadow-[0_10px_0_#991b1b] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3">
                    <i data-lucide="play" class="w-8 h-8 fill-current"></i> SPIN SEKARANG
                </button>
            </div>
        </div>

        <!-- Kanan: Log Edukasi & Analisis -->
        <div class="lg:col-span-5 flex flex-col gap-6">
            <div class="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] p-6 h-[500px] flex flex-col shadow-xl">
                <h2 class="text-sm font-black text-zinc-500 uppercase tracking-tighter mb-4 flex items-center gap-2">
                    <i data-lucide="cpu" class="w-4 h-4 text-red-500"></i> Server Log: Manipulasi Algoritma
                </h2>
                <div id="log-container" class="flex-grow overflow-y-auto space-y-3 pr-2 custom-scrollbar">
                    <div class="bg-zinc-950 p-3 rounded-xl border border-white/5 text-[11px] text-zinc-400">
                        Sistem standby. Silakan lakukan deposit untuk memulai simulasi kehilangan uang.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Deposit Otentik -->
    <div id="depo-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="bg-zinc-900 w-full max-w-md rounded-[2.5rem] border border-zinc-700 overflow-hidden shadow-2xl">
            <div class="bg-red-600 p-6 flex justify-between items-center">
                <h2 class="font-black text-white italic tracking-tighter">FORM DEPOSIT CEPAT</h2>
                <button onclick="closeDepo()" class="text-white/80 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-zinc-500 uppercase">Pilih Nominal</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setDepoVal(50000)" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl text-sm font-bold border border-white/5 transition">50.000</button>
                        <button onclick="setDepoVal(100000)" class="bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl text-sm font-bold border border-white/5 transition">100.000</button>
                    </div>
                </div>
                <div class="p-4 bg-zinc-950 rounded-2xl border border-white/5 flex flex-col items-center gap-4">
                    <div class="w-32 h-32 bg-white p-2 rounded-lg">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=RUNGKAD_DONG" alt="QRIS Palsu">
                    </div>
                    <p class="text-[10px] text-center text-zinc-500">Scan QRIS di atas (Hanya Simulasi) untuk mengisi saldo virtual Anda.</p>
                </div>
                <button onclick="prosesDepo()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl transition uppercase tracking-tighter shadow-lg">
                    Konfirmasi Deposit
                </button>
            </div>
        </div>
    </div>

    <script>
        let saldo = 0;
        const symbols = ['💎', '🍒', '🍋', '🔔', '⭐', '7️⃣'];
        const spinCountLog = 0;
        let isSpinning = false;
        let depoAmount = 50000;

        // Inisialisasi Reel
        function initReels() {
            [1, 2, 3].forEach(id => {
                const reel = document.getElementById(`reel-${id}`);
                reel.innerHTML = '';
                // Buat strip panjang agar bisa di-scroll
                for(let i=0; i<20; i++) {
                    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    const div = document.createElement('div');
                    div.className = 'symbol';
                    div.innerText = symbol;
                    reel.appendChild(div);
                }
            });
        }

        function openDepo() { document.getElementById('depo-modal').style.display = 'flex'; }
        function closeDepo() { document.getElementById('depo-modal').style.display = 'none'; }
        function setDepoVal(val) { depoAmount = val; }

        function prosesDepo() {
            saldo += depoAmount;
            updateUI();
            addLog("Deposit Berhasil!", `Saldo Rp ${depoAmount.toLocaleString()} ditambahkan. Bandar tersenyum lebar melihat uang Anda masuk ke sistem.`, "success");
            closeDepo();
        }

        function updateUI() {
            document.getElementById('saldo-display').innerText = `Rp ${saldo.toLocaleString()}`;
        }

        function addLog(title, desc, type = "info") {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            const color = type === "success" ? "text-green-500" : (type === "warning" ? "text-yellow-500" : "text-red-500");
            div.className = "log-entry bg-black/60 p-4 rounded-2xl border border-white/5";
            div.innerHTML = `
                <h4 class="text-[11px] font-black uppercase mb-1 ${color}">${title}</h4>
                <p class="text-[10px] text-zinc-400 leading-relaxed">${desc}</p>
            `;
            container.prepend(div);
        }

        async function mulaiSpin() {
            if (isSpinning) return;
            const bet = parseInt(document.getElementById('bet-select').value);

            if (saldo < bet) {
                addLog("SALDO TIDAK CUKUP", "Yah, uang simulasi kamu habis. Persis seperti di dunia nyata, bandar akan membuangmu jika tidak punya uang lagi. Silakan deposit lagi.", "error");
                openDepo();
                return;
            }

            saldo -= bet;
            updateUI();
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;

            // Logika Manipulasi: 
            // - Spin ke-1 sampai ke-3: Kasih menang dikit (biar seneng)
            // - Spin ke-4 dst: Habiskan!
            window.spinCount = (window.spinCount || 0) + 1;
            
            let winChance = 0.1; // Default RTP 10% (Sangat kejam)
            if (window.spinCount <= 2) winChance = 0.7; // 2 Spin pertama kemungkinan menang tinggi (Hook)

            const isWin = Math.random() < winChance;

            // Animasi Spin
            [1, 2, 3].forEach((id, idx) => {
                const reel = document.getElementById(`reel-${id}`);
                const shift = Math.floor(Math.random() * 10) + 5;
                reel.style.transition = `transform ${2 + idx * 0.5}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
                reel.style.transform = `translateY(-${shift * 150}px)`;
            });

            setTimeout(() => {
                if (isWin) {
                    const winAmt = bet * 2;
                    saldo += winAmt;
                    updateUI();
                    addLog("KEMENANGAN PALSU!", `Selamat! Anda "menang" Rp ${winAmt.toLocaleString()}. Ini adalah taktik 'Hook' agar hormon dopamin Anda melonjak dan ingin main lagi dengan bet lebih besar.`, "success");
                    document.body.classList.add('jackpot-anim');
                    setTimeout(() => document.body.classList.remove('jackpot-anim'), 1000);
                } else {
                    addLog("RUNGKAD!", `Zonk! Anda kehilangan Rp ${bet.toLocaleString()}. Algoritma PRNG (Pseudo Random Number Generator) telah memastikan bandar tetap untung 90% dari total taruhan pemain.`, "error");
                }
                
                // Reset posisi tanpa animasi untuk loop berikutnya
                setTimeout(() => {
                    [1, 2, 3].forEach(id => {
                        const reel = document.getElementById(`reel-${id}`);
                        reel.style.transition = 'none';
                        reel.style.transform = 'translateY(0)';
                    });
                    isSpinning = false;
                    document.getElementById('spin-btn').disabled = false;
                }, 500);

            }, 3500);
        }

        window.onload = () => {
            initReels();
            lucide.createIcons();
            addLog("System Online", "Gunakan simulator ini untuk melihat bagaimana algoritma 'menyedot' saldo pemain secara perlahan namun pasti.", "info");
        };
    </script>
</body>
</html>
