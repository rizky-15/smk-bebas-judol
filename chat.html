<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Anti - Teman Curhat & Solusi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .chat-container { flex-grow: 1; overflow-y: auto; scrollbar-width: none; }
        .message-ai { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 4px solid #dc2626; }
        .message-user { background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); }
        .input-glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <header class="p-5 flex items-center justify-between bg-black/40 backdrop-blur-md border-b border-white/5 z-10">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full hover:bg-zinc-800 transition">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center"><i data-lucide="shield-check" class="w-6 h-6"></i></div>
                <div>
                    <h1 class="text-sm font-black tracking-tight uppercase">Bang Anti</h1>
                    <span class="text-[10px] text-zinc-500 font-bold uppercase">Mode Aman & Privat</span>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-container p-5 space-y-6">
        <div class="flex justify-start">
            <div class="message-ai p-5 rounded-2xl rounded-tl-none max-w-[85%]">
                <p class="text-sm leading-relaxed text-zinc-200">Halo! Sekarang koneksi kita sudah aman lewat server Vercel. Mau curhat apa hari ini?</p>
            </div>
        </div>
    </main>

    <footer class="input-glass p-4 md:p-6">
        <div class="max-w-4xl mx-auto flex items-end gap-3">
            <textarea id="user-input" rows="1" placeholder="Tulis pesan..." class="w-full bg-zinc-900 border border-white/10 rounded-2xl px-5 py-4 text-sm text-white focus:outline-none focus:border-red-600 transition-all resize-none"></textarea>
            <button onclick="sendMessage()" id="send-btn" class="w-14 h-14 bg-red-600 hover:bg-red-500 text-white rounded-2xl flex items-center justify-center active:scale-95 transition">
                <i data-lucide="send" class="w-6 h-6"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        const systemPrompt = "Nama lo Bang Anti. Abang-abangan bijak, empati, pake bahasa gaul tapi sopan. Pakar psikologi adiksi dan hukum Indonesia. Bongkar kebohongan judi online.";

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';
            const loadingId = 'load-' + Date.now();
            showLoading(loadingId);

            try {
                // MEMANGGIL API INTERNAL VERCEL (AMAN)
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: message }
                        ]
                    })
                });

                const data = await response.json();
                hideLoading(loadingId);
                addMessage(data.choices[0].message.content, 'ai');

            } catch (error) {
                hideLoading(loadingId);
                addMessage("Yah, ada gangguan teknis nih. Coba lagi ya!", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${sender === 'user' ? 'message-user' : 'message-ai'} p-4 rounded-2xl max-w-[85%] text-sm">${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function showLoading(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start";
            div.innerHTML = `<div class="message-ai p-4 rounded-2xl animate-pulse text-xs text-zinc-500 italic">Bang Anti lagi mikir...</div>`;
            chatBox.appendChild(div);
        }

        function hideLoading(id) { document.getElementById(id)?.remove(); }
        lucide.createIcons();
    </script>
</body>
</html>
