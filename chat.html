<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bang Anti - Teman Curhat & Solusi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { 
            background-color: #050505; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            /* Perbaikan Utama untuk Mobile: Menggunakan dvh (Dynamic Viewport Height) */
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        .chat-container { 
            flex-grow: 1; 
            overflow-y: auto; 
            scrollbar-width: none; 
            padding-bottom: 20px;
        }
        .chat-container::-webkit-scrollbar { display: none; }
        .message-ai { background: rgba(24, 24, 27, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-left: 4px solid #dc2626; }
        .message-user { background: linear-gradient(135deg, #dc2626 0%, #7f1d1d 100%); }
        .input-glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Auto resize transisi untuk textarea */
        textarea {
            transition: border-color 0.2s;
        }
    </style>
</head>
<body>

    <header class="p-4 md:p-5 flex items-center justify-between bg-black/40 backdrop-blur-md border-b border-white/5 z-10 shrink-0">
        <div class="flex items-center gap-3 md:gap-4">
            <button onclick="window.location.href='member_dashboard.html'" class="w-9 h-9 md:w-10 md:h-10 flex items-center justify-center bg-zinc-900 rounded-full hover:bg-zinc-800 transition">
                <i data-lucide="chevron-left" class="w-5 h-5 md:w-6 md:h-6"></i>
            </button>
            <div class="flex items-center gap-2 md:gap-3">
                <div class="w-9 h-9 md:w-10 md:h-10 bg-red-600 rounded-xl flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5 md:w-6 md:h-6 text-white"></i></div>
                <div>
                    <h1 class="text-xs md:text-sm font-black tracking-tight uppercase">Bang Anti</h1>
                    <span class="text-[9px] md:text-[10px] text-zinc-500 font-bold uppercase block -mt-0.5">Mode Aman & Privat</span>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-box" class="chat-container p-4 md:p-5 space-y-4 md:space-y-6">
        <div class="flex justify-start">
            <div class="message-ai p-4 md:p-5 rounded-2xl rounded-tl-none max-w-[90%] md:max-w-[85%]">
                <p class="text-xs md:text-sm leading-relaxed text-zinc-200">Halo! Sekarang koneksi kita sudah aman lewat server. Mau curhat apa hari ini soal pengalaman main atau kebingungan lo?</p>
            </div>
        </div>
    </main>

    <footer class="input-glass p-3 md:p-6 shrink-0 pb-safe">
        <div class="max-w-4xl mx-auto flex items-end gap-2 md:gap-3">
            <!-- Textarea dengan fungsi oninput untuk auto-resize -->
            <textarea id="user-input" rows="1" placeholder="Tulis pesan..." 
                      class="w-full bg-zinc-900 border border-white/10 rounded-2xl md:rounded-3xl px-4 py-3 md:px-5 md:py-4 text-xs md:text-sm text-white focus:outline-none focus:border-red-600 resize-none overflow-y-auto max-h-32"
                      style="min-height: 44px;"
                      oninput="autoResize(this)"
                      onkeypress="handleKeyPress(event)"></textarea>
            
            <!-- Tambahan shrink-0 agar tombol tidak mengecil saat diketik banyak teks -->
            <button onclick="sendMessage()" id="send-btn" class="shrink-0 w-11 h-11 md:w-14 md:h-14 bg-red-600 hover:bg-red-500 text-white rounded-xl md:rounded-2xl flex items-center justify-center active:scale-95 transition shadow-lg shadow-red-900/20">
                <i data-lucide="send" class="w-5 h-5 md:w-6 md:h-6 ml-0.5"></i>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // Fungsi Auto-Resize untuk Mobile
        function autoResize(textarea) {
            textarea.style.height = 'auto'; // Reset height
            textarea.style.height = textarea.scrollHeight + 'px'; // Set ke height dari konten
            
            // Scroll sedikit jika perlu
            if (document.activeElement === textarea) {
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        // Kirim pesan dengan tombol Enter (Khusus Desktop)
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        const systemPrompt = "Nama lo Bang Anti. Abang-abangan bijak, empati, pake bahasa gaul tapi sopan. Pakar psikologi adiksi dan hukum Indonesia. Bongkar kebohongan judi online.";

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            
            // Reset input
            userInput.value = '';
            userInput.style.height = 'auto'; // Kembalikan ukuran normal

            const loadingId = 'load-' + Date.now();
            showLoading(loadingId);

            try {
                // MEMANGGIL API INTERNAL VERCEL (AMAN)
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: message }
                        ]
                    })
                });

                const data = await response.json();
                hideLoading(loadingId);
                
                if(data.choices && data.choices[0]) {
                    addMessage(data.choices[0].message.content, 'ai');
                } else {
                    addMessage("Waduh, API lagi sibuk nih. Coba sapa lagi dong!", 'ai');
                }

            } catch (error) {
                hideLoading(loadingId);
                addMessage("Yah, ada gangguan teknis server nih. Coba lagi ya!", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${sender === 'user' ? 'message-user' : 'message-ai'} p-4 rounded-2xl ${sender === 'user' ? 'rounded-tr-none' : 'rounded-tl-none'} max-w-[90%] md:max-w-[85%] text-xs md:text-sm shadow-md">${text.replace(/\n/g, '<br>')}</div>`;
            chatBox.appendChild(div);
            
            // Scroll ke bawah agar pesan terbaru terlihat (Optimasi Mobile)
            setTimeout(() => {
                chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function showLoading(id) {
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start";
            div.innerHTML = `<div class="message-ai p-3 md:p-4 rounded-2xl rounded-tl-none animate-pulse text-xs text-zinc-400 italic shadow-md">Bang Anti ngetik...</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function hideLoading(id) { document.getElementById(id)?.remove(); }
        
        lucide.createIcons();
    </script>
</body>
</html>
